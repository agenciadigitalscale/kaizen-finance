name = "kaizen"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# ── Variáveis de ambiente (sobrescrever em produção via dashboard Cloudflare) ──
[vars]
# ANTHROPIC_API_KEY = ""    # Adicionar no dashboard — nunca commitar
# WHATSAPP_TOKEN    = ""    # Opcional — para alertas WhatsApp

# ── D1 Database ───────────────────────────────────────────────────────────────
# Criar banco: wrangler d1 create kaizen-db
# Aplicar schema: wrangler d1 execute kaizen-db --file=functions/api/schema.sql
[[d1_databases]]
binding      = "DB"
database_name = "kaizen-db"
database_id  = "d2064496-c7f2-499b-b661-a5d761fc667e"

# ── Workers AI (transcrição de áudio do WhatsApp via Whisper) ─────────────────
[ai]
binding = "AI"

# ── JWT Secret (KV ou variável de ambiente) ───────────────────────────────────
# Adicionar via: wrangler secret put JWT_SECRET
